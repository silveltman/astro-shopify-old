paths:
  uploads: assets/uploads
  dam_uploads: raw

# -----------------------------------------------
# Cloudcannn sidebar configuration
# -----------------------------------------------

collection_groups:
  - heading: Pages
    collections:
      - pages

# -----------------------------------------------
# Collection configuration
# -----------------------------------------------

collections_config:
  # data:
  #   filter:
  #     base: none
  #     include:
  #       - footer.yaml

  pages:
    output: true
    _enabled_editors:
      - visual
    path: 'src/pages'
    glob: 
      - './src/pages/*.md'

# -----------------------------------------------
# Input customization
# -----------------------------------------------

_inputs:
  layout:
    hidden: true

  seo:
    label: SEO
    comment: 'Zoekmachine-optimalisate, Wordt weergegeven in Google en heeft invloed op je vindbaarheid'

  seo_title:
    label: Titel
    comment: Probeer de pagina te beschrijven in 50-60 karakters

  seo_description:
    label: Beschrijving
    comment: Probeer je pagina te beschrijven in 50-120 karakters

  alt:
    label: Omschrijving
    comment: Omschrijf je afbeelding in maximaal 125 karakters
    type: textarea

  text:
    type: textarea

  icon:
    hidden: true

